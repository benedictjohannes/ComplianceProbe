# yaml-language-server: $schema=../playbook.schema.json
title: "E2E Report Auditor"

sections:
  - title: "Verification of E2E Results & Persistence"
    description:
      - "Audits artifacts from the previous run and verifies file cleanup"
    assertions:
      - code: REPORT_AUDIT
        title: "Comprehensive Artifact Audit"
        description: "Verifies file persistence, cleanup, context redaction, and data consistency"
        preCmds:
          - script: sleep 1
        cmds:
          # 1. Verify existence of temp files from previous run and gather data
          - exec:
              script: "cat random_number1.txt"
              gather:
                - key: "new_gather_num1"
                  regex: "(\\d+)"
          - exec:
              script: "stat random_number2.txt"
            exitCodeRules:
              - min: 1
                max: 1
                result: 1
              - result: -1
          # 2. Locate the latest report from the reports folder
          - exec:
              script: "ls reports/*.report.json"
              gather:
                - key: "latest_report_json"
                  func: |
                    (stdout) => {
                      const files = stdout.trim().split("\n");
                      return files.sort().reverse()[0]; 
                    }

          # 3. Audit JSON report content: check gathered contents (using NodeJS)
          - exec:
              func: |
                ({ assertionContext }) => {
                  const f = assertionContext.latest_report_json
                  const n = assertionContext.new_gather_num1
                  return `
                    const fs = require('fs')
                    const r = JSON.parse(fs.readFileSync('${f}', 'utf8')).assertions.JSStateMachineTest
                    if (Number(r.context.num1) !== ${n}) {
                      console.error('❌ num1 mismatch: ' + r.context.num1 + ' !== ' + ${JSON.stringify(n)})
                      process.exit(1)
                    }
                    if (Object.prototype.hasOwnProperty.call(r.context, 'num2_secret')) {
                      console.error('❌ num2_secret was not redacted')
                      process.exit(2)
                    }
                    console.log('✅ num1 matches and num2_secret is redacted')
                  `
                }
              shell: "node"
              scriptFileExtension: "js"
          # 4. Audit log report content: check that excludedFromReport is [REDACTED] (using Python)
          - exec:
              func: |
                ({assertionContext}) => {
                  const logFile = assertionContext.latest_report_json.replace('.json', '.log');
                  return `
                import sys
                log_file = ${JSON.stringify(logFile)}
                with open(log_file, 'r') as f:
                    log = f.read()

                marker = '>>>>> COMMAND: cat random_number2.txt <<<<<'
                entries = log.split('\\n')
                try:
                    idx = entries.index(marker)
                    redacted = entries[idx + 3]
                    if '[REDACTED]' not in redacted:
                        print(f'❌ Redaction marker not found in entry: {redacted}')
                        sys.exit(2)
                except (ValueError, IndexError):
                    print('❌ Marker not found in log')
                    sys.exit(1)
                print('✅ Redaction marker found in log')
                sys.exit(0)`
                }
              shell: "python3"
              scriptFileExtension: "py"
        postCmds: [{ script: "rm random_number1.txt" }]
        passDescription: "Report audit successful: Redaction enforced and data integrity verified."
        failDescription: "Report audit failed: Detected data inconsistency or redaction failure."
